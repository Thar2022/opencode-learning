name: opencode
on:
  issue_comment:
    types: [created]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anomalyco/opencode-action@v1
        with:
          model: opencode-go/deepseek-v4-pro
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
